services:
  - type: web
    name: astro-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: OPENROUTER_FALLBACK_MODELS
        value: google/gemini-2.5-flash,openai/gpt-4o-mini
      - key: OPENROUTER_SITE_URL
        value: https://astro-bot-l9ae.onrender.com
      - key: OPENROUTER_APP_NAME
        value: astro-bot
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        value: 1u-IDQPi0g-mFxPDetdV46p90xRgLAQZ3Jz90brLl6-M
